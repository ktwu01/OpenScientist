name: Submit a Decision Tree
description: Submit a research decision tree generated by /researchskills-extract or the web prompt
title: "Decision Tree: [project or paper title]"
labels: ["decision-tree-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Submit your research decision tree here! Paste the full JSON output below.

        **How to generate a decision tree:**
        - **Claude Code / Codex:** Install `npm install -g @scienceintelligence/researchskills-extract`, then run `/researchskills-extract`
        - **Web (ChatGPT / Claude / Gemini):** Use the one-click prompt from the [README](https://github.com/ScienceIntelligence/ResearchSkills#method-b-one-click-prompt-for-web-users-chatgpt--claude--gemini)

  - type: input
    id: english_name
    attributes:
      label: Full Name
      description: Your full name in English
      placeholder: "e.g. Albert Einstein"
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Role
      description: Your current academic or professional role
      options:
        - "Undergraduate Student"
        - "Master's Student"
        - "PhD Candidate"
        - "Postdoctoral Researcher"
        - "Research Scientist"
        - "Research Engineer"
        - "Assistant Professor"
        - "Associate Professor"
        - "Professor"
        - "Principal Investigator (PI)"
        - "Industry Researcher"
        - "Independent Researcher"
    validations:
      required: true

  - type: input
    id: affiliation
    attributes:
      label: Affiliation
      description: Your institution or organization
      placeholder: "e.g. ETH Zürich Physics"
    validations:
      required: true

  - type: dropdown
    id: subdomain
    attributes:
      label: Primary Research Subdomain
      description: Which subdomain is this research in? Type to search.
      options:
        - "Computer Science / Artificial Intelligence"
        - "Computer Science / Computation and Language"
        - "Computer Science / Computational Complexity"
        - "Computer Science / Computational Engineering Finance and Science"
        - "Computer Science / Computational Geometry"
        - "Computer Science / Computer Science and Game Theory"
        - "Computer Science / Computer Vision and Pattern Recognition"
        - "Computer Science / Computers and Society"
        - "Computer Science / Cryptography and Security"
        - "Computer Science / Data Structures and Algorithms"
        - "Computer Science / Databases"
        - "Computer Science / Digital Libraries"
        - "Computer Science / Discrete Mathematics"
        - "Computer Science / Distributed Parallel and Cluster Computing"
        - "Computer Science / Emerging Technologies"
