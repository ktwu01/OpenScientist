      required: true

  - type: dropdown
    id: anchor_type
    attributes:
      label: Tree Anchor Type
      description: Is this tree linked to a paper or an in-progress project?
      options:
        - "Paper (arXiv, DOI, or published URL)"
        - "Project (no paper yet)"
    validations:
      required: true

  - type: input
    id: anchor_reference
    attributes:
      label: Paper URL or Project Description
      description: "Paper: paste the arXiv/DOI/URL. Project: write a one-sentence description."
      placeholder: "e.g. https://arxiv.org/abs/2401.12345 or 'Investigating novel attention mechanisms for protein folding'"
    validations:
      required: true

  - type: textarea
    id: tree_json
    attributes:
      label: Decision Tree JSON
      description: Paste the FULL JSON output of your decision tree here
      placeholder: |
        {
          "version": "2.0.0",
          "anchor": { "type": "paper", "paper_url": "..." },
          "contributor": "Your Name (Your Institution)",
          "extracted_at": "2026-04-10",
          "nodes": [
            {
              "id": "001",
              "action": "search_literature",
              "summary": "...",
              "outcome": "success: ...",
              "reasoning": "...",
              "tools_used": [],
              "parent_id": null,
              "confidence": "high",
              "initiator": "human",
              "status": "active"
            }
          ]
        }
      render: json
    validations:
      required: true

  - type: dropdown
    id: generation_method
    attributes:
      label: How was this tree created?
      options:
        - "Generated by /researchskills-extract, then reviewed by me"
        - "Generated via web prompt, then reviewed by me"
        - "Constructed manually"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes (Optional)
      description: Any context about the research, known gaps in the tree, or sessions that may have been missed
      placeholder: "Some early exploratory conversations from January weren't captured. The tree covers Feb-April."
    validations:
      required: false
