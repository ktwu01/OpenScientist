name: Reviewer Application
description: Apply to become a subdomain reviewer for ResearchSkills
title: "Reviewer Application: [Your Name]"
labels: ["maintainer-application"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in becoming a subdomain reviewer! Please fill out all fields below.
        A repo admin will review your application and, once approved, you'll be onboarded automatically.

  - type: input
    id: english_name
    attributes:
      label: English Name
      description: Your full name in English
      placeholder: "e.g. Albert Einstein"
    validations:
      required: true

  - type: input
    id: chinese_name
    attributes:
      label: Chinese Name
      description: Your full name in Chinese (optional, leave blank if not applicable)
      placeholder: "e.g. 阿尔伯特·爱因斯坦"
    validations:
      required: false

  - type: input
    id: affiliation
    attributes:
      label: Affiliation
      description: Your institution
      placeholder: "e.g. ETH Zürich"
    validations:
      required: true

  - type: input
    id: short_affiliation
    attributes:
      label: Short Affiliation
      description: Short version for the knowledge tree badge
      placeholder: "e.g. ETH Zürich"
    validations:
      required: true

  - type: dropdown
    id: role
    attributes:
      label: Role
      description: Your current academic/research role
      options:
        - Professor
        - Associate Professor
        - Assistant Professor
        - Postdoc
        - PhD Student
        - Research Scientist
        - Research Fellow
        - Other
    validations:
      required: true

  - type: input
    id: homepage
    attributes:
      label: Homepage
      description: "Your academic profile URL (Google Scholar, LinkedIn, OpenReview, or personal homepage)"
      placeholder: "e.g. https://scholar.google.com/citations?user=XXXXXXX"
    validations:
      required: true

  - type: input
    id: review_count
    attributes:
      label: Number of Papers Reviewed
      description: Approximate number of papers you have been invited to review
      placeholder: "e.g. 30"
    validations:
      required: true

  - type: textarea
    id: review_venues
    attributes:
      label: Review Venues
      description: Journals, conferences, or workshops you have reviewed for
      placeholder: |
        - NeurIPS 2024
        - ICML 2023, 2024
        - Nature Machine Intelligence
    validations:
      required: true

  - type: checkboxes
    id: subdomain
    attributes:
      label: Subdomain
      description: Select the subdomain(s) you want to review.
