name: Maintainer Application
description: Apply to become a subdomain maintainer for OpenScientist
title: "Maintainer Application: [subdomain]"
labels: ["maintainer-application"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in becoming a subdomain maintainer! Please fill out all fields below.
        A repo admin will review your application and, once approved, you'll be onboarded automatically.

  - type: input
    id: english_name
    attributes:
      label: English Name
      description: Your full name in English
      placeholder: "e.g. Albert Einstein"
    validations:
      required: true

  - type: input
    id: chinese_name
    attributes:
      label: Chinese Name
      description: Your full name in Chinese
      placeholder: "e.g. 阿尔伯特·爱因斯坦"
    validations:
      required: true

  - type: input
    id: github_username
    attributes:
      label: GitHub Username
      description: Your GitHub username (without the @ symbol)
      placeholder: "e.g. alberteinstein"
    validations:
      required: true

  - type: input
    id: affiliation
    attributes:
      label: Affiliation
      description: Your institution and role
      placeholder: "e.g. ETH Zürich Professor"
    validations:
      required: true

  - type: input
    id: short_affiliation
    attributes:
      label: Short Affiliation
      description: Short version for the knowledge tree badge
      placeholder: "e.g. ETH Zürich"
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain
      description: The top-level domain your subdomain belongs to
      options:
        - Physics
        - Mathematics
        - Computer Science
        - Quantitative Biology
        - Statistics
        - EESS
        - Economics
        - Quantitative Finance
    validations:
      required: true

  - type: dropdown
    id: subdomain
    attributes:
      label: Subdomain
      description: The specific subdomain you want to maintain. Format is "Domain / Subdomain".
