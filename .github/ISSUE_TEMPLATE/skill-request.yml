name: Skill Request
description: Request a new Claude Code Skill from a domain expert
title: "Skill Request: [skill name]"
labels: ["skill-request"]
body:
  - type: markdown
    attributes:
      value: |
        Don't see the skill you need? Request it here!
        A domain expert from the community may pick it up and build the reasoning protocol for you.

  - type: input
    id: english_name
    attributes:
      label: English Name
      description: Your full name in English
      placeholder: "e.g. Albert Einstein"
    validations:
      required: true

  - type: input
    id: affiliation
    attributes:
      label: Affiliation
      description: Your institution or organization
      placeholder: "e.g. ETH Zürich"
    validations:
      required: true

  - type: dropdown
    id: subdomain
    attributes:
      label: Target Subdomain
      description: Which subdomain should this skill belong to? Type to search.
      options:
        # Physics (27)
