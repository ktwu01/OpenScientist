  - type: input
    id: skill_name
    attributes:
      label: Proposed Skill Name
      description: A short, descriptive name for the skill you need
      placeholder: "e.g. quantum-entanglement"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Skill Description
      description: What reasoning capability do you want the AI agent to have? What problem should it solve?
      placeholder: "I want an AI agent that can..."
    validations:
      required: true

  - type: textarea
    id: resources
    attributes:
      label: Relevant Resources (Optional)
      description: Links to key papers, textbooks, databases, or tools that would help build this skill
      placeholder: |
        - https://arxiv.org/abs/xxxx.xxxxx
        - Textbook: "..."
    validations:
      required: false
