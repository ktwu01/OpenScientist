  - type: dropdown
    id: category
    attributes:
      label: Research Activity Category
      description: What type of research activity does this skill cover?
      options:
        - "01-literature-search — Literature search & survey"
        - "02-hypothesis-and-ideation — Hypothesis formation & ideation"
        - "03-math-and-modeling — Math derivation & modeling"
        - "04-experiment-planning — Experiment design & planning"
        - "05-data-acquisition — Data collection & management"
        - "06-coding-and-execution — Coding & experiment execution"
        - "07-result-analysis — Result analysis & visualization"
        - "08-reusable-tooling — Reusable tool & method development"
        - "09-paper-writing — Paper writing & publication"
        - "10-review-and-rebuttal — Peer review & rebuttal"
    validations:
