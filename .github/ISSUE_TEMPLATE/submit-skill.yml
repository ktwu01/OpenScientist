  - type: textarea
    id: skill_content
    attributes:
      label: Skill File Content
      description: Paste the FULL content of your skill .md file here (including the YAML frontmatter between --- markers)
      placeholder: |
        ---
        name: your-skill-name
        description: >
          What this skill does...
        domain: physics
        subdomain: quantum-physics
        author: "Your Name (Your Institution)"
        expertise_level: intermediate
        tags: []
        dependencies: []
        version: 1.0.0
        status: draft
        reviewed_by: []
        ---

        ## Purpose
        ...

        ## Tools
        ...

        ## Domain Knowledge
        ...

        ## Reasoning Protocol
        ...

        ## Common Pitfalls
        ...
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: generation_method
    attributes:
      label: How was this skill created?
      options:
        - "Generated by /extract-knowhow, then reviewed by me"
        - "Written manually"
        - "Generated by /extract-knowhow, submitted as-is"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes (Optional)
      description: Any context about the skill, known limitations, or areas that need expert review
      placeholder: "This skill was extracted from my DFT simulation workflow. The VASP parameters are well-tested but the ABINIT section needs review."
    validations:
      required: false
