name: Submit a Skill
description: Submit a skill file generated by /extract-knowhow or written manually
title: "Skill Submission: [skill name]"
labels: ["skill-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Submit your skill here! Paste the full content of your `.md` skill file below.

        **How to generate a skill:**
        1. Install: `npm install -g @openscientist/extract-knowhow`
        2. In Claude Code: `/model opus[1m]` → `/effort max` → `/extract-knowhow`
        3. Review the generated file, then paste its content here.

  - type: input
    id: english_name
    attributes:
      label: Full Name
      description: Your full name in English
      placeholder: "e.g. Albert Einstein"
    validations:
      required: true

  - type: input
    id: affiliation
    attributes:
      label: Affiliation
      description: Your institution or organization
      placeholder: "e.g. ETH Zürich Physics"
    validations:
      required: true

