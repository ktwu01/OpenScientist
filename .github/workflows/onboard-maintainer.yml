name: Onboard Reviewer

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  onboard:
    if: >-
      github.event.label.name == 'approved' &&
      contains(toJSON(github.event.issue.labels.*.name), 'maintainer-application')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Lock issue to prevent edits during processing
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.lock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              lock_reason: 'resolved'
            });

      - name: Parse issue body
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;

            // GitHub issue forms use "### Label\n\nValue\n\n" format
            function extractField(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n([^\\n]+)`, 'i');
              const match = body.match(regex);
              if (!match) {
                core.setFailed(`Could not find field: ${label}`);
                return '';
              }
              return match[1].trim();
            }

            // Extract checked checkboxes from "### Subdomain" section
            function extractCheckedSubdomains() {
              const sectionRegex = /### Subdomain\s*\n\n([\s\S]*?)(?=\n### |\n*$)/i;
              const sectionMatch = body.match(sectionRegex);
              if (!sectionMatch) {
                core.setFailed('Could not find Subdomain section');
                return [];
              }
              const lines = sectionMatch[1].split('\n');
              const checked = [];
              for (const line of lines) {
                const m = line.match(/^- \[x\]\s*(.+)/i);
                if (m) checked.push(m[1].trim());
              }
              return checked;
            }

            const englishName = extractField('English Name');
            const chineseNameRaw = extractField('Chinese Name');
            const chineseName = (chineseNameRaw && chineseNameRaw !== '_No response_') ? chineseNameRaw : englishName;
            const githubUsername = context.payload.issue.user.login;
            const affiliation = extractField('Affiliation');
            const shortAffiliation = extractField('Short Affiliation');
            const role = extractField('Role');
            let homepage = extractField('Homepage');

            // Parse checked subdomains (checkbox format)
            const checkedSubdomains = extractCheckedSubdomains();
            if (checkedSubdomains.length === 0) {
              core.setFailed('No subdomain selected (no checkboxes checked)');
              return;
            }

            // Validate free-text fields against JS/HTML injection characters
            const fieldsToValidate = {
              'English Name': englishName,
              'Chinese Name': chineseName,
              'Affiliation': affiliation,
              'Short Affiliation': shortAffiliation,
            };
            for (const [label, value] of Object.entries(fieldsToValidate)) {
              if (/[\\"]/.test(value)) {
                core.setFailed(`Field "${label}" contains disallowed characters (backslash or double quote): ${value}`);
                return;
              }
            }

            // Auto-prepend https:// if missing
            if (homepage && homepage !== '_No response_' && !/^https?:\/\//.test(homepage)) {
              homepage = 'https://' + homepage;
            }

            // Validate homepage
            if (homepage && homepage !== '_No response_') {
              if (!/^https:\/\/[^\s"\\]+$/.test(homepage)) {
                core.setFailed(`Invalid homepage URL (must start with https:// and contain no spaces, quotes, or backslashes): ${homepage}`);
                return;
              }
            }

            const folderMap = {
              'Physics': 'physics',
              'Mathematics': 'mathematics',
              'Computer Science': 'computer-science',
              'Quantitative Biology': 'quantitative-biology',
              'Statistics': 'statistics',
              'EESS': 'eess',
              'Economics': 'economics',
              'Quantitative Finance': 'quantitative-finance',
            };

            // Build array of subdomain entries
            const subdomains = [];
            for (const raw of checkedSubdomains) {
              if (!raw.includes(' / ')) {
                core.setFailed(`Invalid subdomain format (expected "Domain / Subdomain"): ${raw}`);
                return;
              }
              const domain = raw.split(' / ')[0];
              const subdomainDisplay = raw.split(' / ').slice(1).join(' / ');
              if (!folderMap[domain]) {
                core.setFailed(`Invalid domain: ${domain}`);
                return;
              }
              const domainFolder = folderMap[domain];
              const subdomainFolder = subdomainDisplay
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-|-$/g, '');
              subdomains.push({ domain, domainFolder, subdomainDisplay, subdomainFolder });
            }

            core.setOutput('english_name', englishName);
            core.setOutput('chinese_name', chineseName);
            core.setOutput('github_username', githubUsername);
            core.setOutput('affiliation', affiliation);
            core.setOutput('short_affiliation', shortAffiliation);
            core.setOutput('role', role);
            core.setOutput('homepage', homepage);
            core.setOutput('subdomains_json', JSON.stringify(subdomains));

            console.log(`Parsed: ${englishName} (${chineseName}), @${githubUsername}`);
            console.log(`Role: ${role}, Affiliation: ${affiliation}`);
            console.log(`Subdomains (${subdomains.length}):`, subdomains.map(s => `${s.domain}/${s.subdomainDisplay}`).join(', '));

      - name: Update CODEOWNERS
        env:
          SUBDOMAINS_JSON: ${{ steps.parse.outputs.subdomains_json }}
          USERNAME: ${{ steps.parse.outputs.github_username }}
        run: |
          CODEOWNERS_PATH=".github/CODEOWNERS"

          for row in $(echo "$SUBDOMAINS_JSON" | jq -r '.[] | @base64'); do
            DOMAIN_FOLDER=$(echo "$row" | base64 -d | jq -r '.domainFolder')
            SUBDOMAIN_FOLDER=$(echo "$row" | base64 -d | jq -r '.subdomainFolder')
            NEW_LINE="skills/${DOMAIN_FOLDER}/${SUBDOMAIN_FOLDER}/  @${USERNAME} @HHHHHejia"

            if grep -q "^skills/${DOMAIN_FOLDER}/${SUBDOMAIN_FOLDER}/" "$CODEOWNERS_PATH"; then
              echo "CODEOWNERS entry for ${DOMAIN_FOLDER}/${SUBDOMAIN_FOLDER} already exists, updating..."
              sed -i "s|^skills/${DOMAIN_FOLDER}/${SUBDOMAIN_FOLDER}/.*|${NEW_LINE}|" "$CODEOWNERS_PATH"
            else
              DOMAIN_LINE=$(grep -n "^skills/${DOMAIN_FOLDER}/ " "$CODEOWNERS_PATH" | head -1 | cut -d: -f1)
              if [ -n "$DOMAIN_LINE" ]; then
                sed -i "${DOMAIN_LINE}a\\${NEW_LINE}" "$CODEOWNERS_PATH"
              else
                echo "$NEW_LINE" >> "$CODEOWNERS_PATH"
              fi
            fi
          done

          echo "Updated CODEOWNERS:"
          cat "$CODEOWNERS_PATH"

      - name: Update docs/index.html
        uses: actions/github-script@v7
        env:
          SUBDOMAINS_JSON: ${{ steps.parse.outputs.subdomains_json }}
          ENGLISH_NAME: ${{ steps.parse.outputs.english_name }}
          CHINESE_NAME: ${{ steps.parse.outputs.chinese_name }}
          USERNAME: ${{ steps.parse.outputs.github_username }}
          SHORT_AFFILIATION: ${{ steps.parse.outputs.short_affiliation }}
          ROLE: ${{ steps.parse.outputs.role }}
          HOMEPAGE: ${{ steps.parse.outputs.homepage }}
        with:
          script: |
            const fs = require('fs');
            const filePath = 'docs/index.html';
            let content = fs.readFileSync(filePath, 'utf8');

            const subdomains = JSON.parse(process.env.SUBDOMAINS_JSON);
            const englishName = process.env.ENGLISH_NAME;
            const chineseName = process.env.CHINESE_NAME;
            const username = process.env.USERNAME;
            const shortAffiliation = process.env.SHORT_AFFILIATION;
            const role = process.env.ROLE;
            const homepage = process.env.HOMEPAGE || '';

            function escapeJS(s) { return s.replace(/\\/g, '\\\\').replace(/"/g, '\\"'); }

            let maintainerObj = `{ name: "${escapeJS(chineseName)}", nameEn: "${escapeJS(englishName)}", github: "${username}", affiliation: "${escapeJS(shortAffiliation)}", role: "${escapeJS(role)}"`;
            if (homepage && homepage !== '_No response_') {
              maintainerObj += `, homepage: "${escapeJS(homepage)}"`;
            }
            maintainerObj += ' }';

            for (const sub of subdomains) {
              const subdomainDisplay = sub.subdomainDisplay;
              const lines = content.split('\n');
              let modified = false;

              for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes(`name: "${subdomainDisplay}"`) && !modified) {
                  const line = lines[i];

                  if (line.includes(`github: "${username}"`)) {
                    console.log(`Reviewer @${username} already exists on "${subdomainDisplay}", skipping`);
                    modified = true;
                    break;
                  }

                  if (line.includes('maintainer: [')) {
                    lines[i] = line.replace(/maintainer: \[/, `maintainer: [${maintainerObj}, `);
                    modified = true;
                  } else if (line.includes('children:')) {
                    lines[i] = line.replace(/, children:/, `, maintainer: [${maintainerObj}], children:`);
                    modified = true;
                  } else if (line.match(/\}\s*,?\s*$/)) {
                    lines[i] = line.replace(/(\s*)\}\s*(,?)\s*$/, `, maintainer: [${maintainerObj}] $1}$2`);
                    lines[i] = lines[i].replace(/\s+\}/, ' }');
                    modified = true;
                  }
                }
              }

              if (modified) {
                content = lines.join('\n');
                console.log(`Added maintainer for "${subdomainDisplay}"`);
              } else {
                console.log(`WARNING: Could not find node for "${subdomainDisplay}" in index.html`);
              }
            }

            fs.writeFileSync(filePath, content);

      - name: Update docs/reviewers.html
        uses: actions/github-script@v7
        env:
          SUBDOMAINS_JSON: ${{ steps.parse.outputs.subdomains_json }}
          ENGLISH_NAME: ${{ steps.parse.outputs.english_name }}
          CHINESE_NAME: ${{ steps.parse.outputs.chinese_name }}
          USERNAME: ${{ steps.parse.outputs.github_username }}
          SHORT_AFFILIATION: ${{ steps.parse.outputs.short_affiliation }}
          ROLE: ${{ steps.parse.outputs.role }}
          HOMEPAGE: ${{ steps.parse.outputs.homepage }}
        with:
          script: |
            const fs = require('fs');
            const filePath = 'docs/reviewers.html';
            let content = fs.readFileSync(filePath, 'utf8');

            const subdomains = JSON.parse(process.env.SUBDOMAINS_JSON);
            const englishName = process.env.ENGLISH_NAME;
            const chineseName = process.env.CHINESE_NAME;
            const username = process.env.USERNAME;
            const shortAffiliation = process.env.SHORT_AFFILIATION;
            const role = process.env.ROLE;
            const homepage = process.env.HOMEPAGE || '';

            function escapeJS(s) { return s.replace(/\\/g, '\\\\').replace(/"/g, '\\"'); }

            const colorMap = {
              'Physics': '#f87171',
              'Quantitative Biology': '#fb923c',
              'EESS': '#fbbf24',
              'Mathematics': '#34d399',
              'Computer Science': '#22d3ee',
              'Statistics': '#60a5fa',
              'Economics': '#818cf8',
              'Quantitative Finance': '#c084fc',
            };

            for (const sub of subdomains) {
              const domain = sub.domain;
              const subdomainDisplay = sub.subdomainDisplay;
              const color = colorMap[domain] || '#5a9cf5';
              const fullSubdomain = domain + ' / ' + subdomainDisplay;

              // Check if this reviewer already exists for this subdomain
              if (content.includes(`github: "${username}"`) && content.includes(`subdomain: "${escapeJS(fullSubdomain)}"`)) {
                console.log(`Reviewer @${username} already exists for "${fullSubdomain}" in reviewers.html, skipping`);
                continue;
              }

              let entry = `  {\n`;
              entry += `    name: "${escapeJS(englishName)}",\n`;
              entry += `    nameCn: "${escapeJS(chineseName)}",\n`;
              entry += `    role: "${escapeJS(role)}",\n`;
              entry += `    affiliation: "${escapeJS(shortAffiliation)}",\n`;
              entry += `    subdomain: "${escapeJS(fullSubdomain)}",\n`;
              entry += `    github: "${username}",\n`;
              if (homepage && homepage !== '_No response_') {
                entry += `    homepage: "${escapeJS(homepage)}",\n`;
              }
              entry += `    color: "${color}"\n`;
              entry += `  }`;

              content = content.replace(
                /(\n)\];/,
                `,\n${entry}\n];`
              );
              console.log(`Added ${englishName} as ${fullSubdomain} reviewer to reviewers.html`);
            }

            fs.writeFileSync(filePath, content);

      - name: Commit and push
        env:
          USERNAME: ${{ steps.parse.outputs.github_username }}
          SUBDOMAINS_JSON: ${{ steps.parse.outputs.subdomains_json }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/CODEOWNERS docs/index.html docs/reviewers.html

          SUBDOMAIN_SUMMARY=$(echo "$SUBDOMAINS_JSON" | jq -r '[.[] | "\(.domainFolder)/\(.subdomainFolder)"] | join(", ")')

          if git diff --cached --quiet; then
            echo "No changes to commit (reviewer may already exist)"
          else
            git commit -m "chore: onboard @${USERNAME} as ${SUBDOMAIN_SUMMARY} reviewer"
            git push
          fi

      - name: Add user as repo collaborator with write access
        uses: actions/github-script@v7
        env:
          USERNAME: ${{ steps.parse.outputs.github_username }}
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const username = process.env.USERNAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            try {
              await github.rest.repos.addCollaborator({
                owner,
                repo,
                username,
                permission: 'push',
              });
              console.log(`Added @${username} as collaborator with write access`);
            } catch (e) {
              console.log(`Failed to add @${username} as collaborator: ${e.message}`);
            }

      - name: Close issue with comment
        uses: actions/github-script@v7
        env:
          MAINTAINER_USERNAME: ${{ steps.parse.outputs.github_username }}
          SUBDOMAINS_JSON: ${{ steps.parse.outputs.subdomains_json }}
        with:
          script: |
            const username = process.env.MAINTAINER_USERNAME;
            const subdomains = JSON.parse(process.env.SUBDOMAINS_JSON);
            const subdomainList = subdomains.map(s => `**${s.domain} / ${s.subdomainDisplay}**`).join(', ');

            await github.rest.issues.unlock({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                `Welcome aboard, @${username}!`,
                ``,
                `You have been onboarded as a reviewer for: ${subdomainList}.`,
                ``,
                `**What was updated:**`,
                `- \`.github/CODEOWNERS\` — PRs touching your subdomain(s) will now request your review`,
                `- \`docs/index.html\` — your name appears on the interactive knowledge tree`,
                `- \`docs/reviewers.html\` — your profile is listed on the reviewers page`,
                ``,
                `Thank you for contributing your expertise to ResearchSkills!`,
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });

      - name: Unlock issue and comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.unlock({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
            } catch (e) {
              // Issue may not be locked yet if failure was before lock step
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `❌ Onboarding workflow failed. Please check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
            });
