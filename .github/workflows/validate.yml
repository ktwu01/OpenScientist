name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate changed skill files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          CHANGED=$(git diff --name-only "origin/$BASE_REF"...HEAD -- 'skills/**/*.md')
          if [ -z "$CHANGED" ]; then
            echo "No skill files changed."
            exit 0
          fi
          echo "Validating: $CHANGED"
          python utils/tools/validate.py $CHANGED
