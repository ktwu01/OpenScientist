<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenScientist — Knowledge Tree</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #0a0e18 0%, #121628 50%, #0e1220 100%);
    color: #c8d0e0;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    color: #e8ecf4;
    margin-bottom: 8px;
  }
  header h1 .emoji { font-size: 2.4rem; }
  header p {
    font-size: 1rem;
    color: #7888a8;
    max-width: 520px;
    margin: 0 auto;
  }
  header a {
    color: #5a9cf5;
    text-decoration: none;
  }
  header a:hover { text-decoration: underline; }

  .tree {
    max-width: 880px;
    margin: 0 auto;
  }

  /* ── node ── */
  .node {
    position: relative;
    margin-left: 24px;
    padding-left: 20px;
    border-left: 1px solid rgba(74, 144, 217, 0.15);
  }
  .node:last-child { border-left-color: transparent; }
  .node:last-child::before {
    content: '';
    position: absolute;
    left: -1px; top: 0;
    width: 1px; height: 20px;
    background: rgba(74, 144, 217, 0.15);
  }

  .node-label {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    margin: 4px 0;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .node-label:hover {
    background: rgba(255,255,255,0.04);
  }
  .node-label::before {
    content: '';
    position: absolute;
    left: -20px; top: 50%;
    width: 20px; height: 1px;
    background: rgba(74, 144, 217, 0.2);
  }

  .node-label .arrow {
    display: inline-block;
    width: 18px; height: 18px;
    text-align: center;
    font-size: 11px;
    line-height: 18px;
    color: #5878a0;
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }
  .node-label .arrow.open { transform: rotate(90deg); }
  .node-label .arrow.leaf { visibility: hidden; }

  .node-label .icon { font-size: 1.3em; flex-shrink: 0; }

  .node-label .name {
    font-weight: 600;
    color: #dce2f0;
    font-size: 0.95rem;
  }
  .node-label .code {
    font-size: 0.78rem;
    color: #5a7090;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    opacity: 0.85;
  }
  .node-label .count {
    font-size: 0.72rem;
    color: #4a6080;
    background: rgba(74,144,217,0.08);
    padding: 1px 8px;
    border-radius: 10px;
  }

  /* children container */
  .children {
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.3s ease;
  }
  .children.open {
    max-height: 5000px;
    opacity: 1;
  }

  /* ── depth-specific colors ── */
  .depth-0 > .node-label .name { font-size: 1.3rem; color: #f0f2f8; }
  .depth-0 > .node-label { padding: 12px 20px; }
  .depth-0 { border-left: none; margin-left: 0; padding-left: 0; }
  .depth-0 > .node-label::before { display: none; }

  .depth-1 > .node-label .name { font-size: 1.05rem; color: #c8d8f0; }

  .leaf-node > .node-label {
    cursor: default;
  }
  .leaf-node > .node-label .name {
    font-weight: 400;
    color: #98a8c0;
    font-size: 0.88rem;
  }

  .maintainer-badge {
    font-size: 0.73rem;
    font-weight: 600;
    background: linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(16, 185, 129, 0.12));
    color: #34d399;
    padding: 3px 10px;
    border-radius: 12px;
    margin-left: 8px;
    border: 1px solid rgba(52, 211, 153, 0.3);
    letter-spacing: 0.02em;
    animation: maintainer-glow 3s ease-in-out infinite alternate;
  }
  @keyframes maintainer-glow {
    from { box-shadow: 0 0 4px rgba(52, 211, 153, 0.15); }
    to   { box-shadow: 0 0 12px rgba(52, 211, 153, 0.3); }
  }
  .has-maintainer > .node-label {
    background: rgba(52, 211, 153, 0.04);
    border-left: 2px solid rgba(52, 211, 153, 0.4);
    padding-left: 14px;
    border-radius: 6px;
  }
  .has-maintainer > .node-label .name {
    color: #d0e8dc !important;
  }

  /* ── responsive ── */
  @media (max-width: 600px) {
    body { padding: 24px 8px 60px; }
    .node { margin-left: 16px; padding-left: 14px; }
    header h1 { font-size: 1.6rem; }
  }

  /* ── footer ── */
  footer {
    text-align: center;
    margin-top: 64px;
    color: #3a4a68;
    font-size: 0.82rem;
  }
  footer a { color: #4a7ab8; text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>

function countLeaves(node) {
  if (!node.children || node.children.length === 0) return 1;
  return node.children.reduce((s, c) => s + countLeaves(c), 0);
}

function renderNode(node, depth) {
  const hasChildren = node.children && node.children.length > 0;
  const isLeaf = !hasChildren;
  const count = hasChildren ? countLeaves(node) : 0;

  const el = document.createElement('div');
  el.className = `node depth-${depth}` + (isLeaf ? ' leaf-node' : '') + (node.maintainer ? ' has-maintainer' : '');

  const label = document.createElement('div');
  label.className = 'node-label';

  // arrow
  const arrow = document.createElement('span');
  arrow.className = 'arrow' + (isLeaf ? ' leaf' : '');
  arrow.textContent = '▶';
  label.appendChild(arrow);

  // icon
  if (node.icon) {
    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = node.icon;
    label.appendChild(icon);
  }

  // name
  const name = document.createElement('span');
  name.className = 'name';
  name.textContent = node.name;
  label.appendChild(name);

  // code
  if (node.code) {
    const code = document.createElement('span');
    code.className = 'code';
    code.textContent = node.code;
    label.appendChild(code);
  }

  // count badge
  if (hasChildren && depth >= 1) {
    const badge = document.createElement('span');
    badge.className = 'count';
    badge.textContent = count;
    label.appendChild(badge);
  }

  // maintainer badge
  if (node.maintainer) {
    const mt = document.createElement('span');
    mt.className = 'maintainer-badge';
    mt.textContent = '✅ ' + node.maintainer;
    label.appendChild(mt);
  }

  el.appendChild(label);

  // children container
  if (hasChildren) {
    const childrenEl = document.createElement('div');
    childrenEl.className = 'children';
    node.children.forEach(child => {
      childrenEl.appendChild(renderNode(child, depth + 1));
    });
    el.appendChild(childrenEl);

    label.addEventListener('click', () => {
      const isOpen = childrenEl.classList.contains('open');
      childrenEl.classList.toggle('open');
      arrow.classList.toggle('open');
    });
  }

  return el;
}

const tree = document.getElementById('tree');
DATA.forEach(group => {

  tree.appendChild(el);
  // auto-expand top-level groups (Natural Sciences, Formal Sciences)
  const children = el.querySelector('.children');
  const arrow = el.querySelector('.arrow');
  if (children) { children.classList.add('open'); arrow.classList.add('open'); }
});
