<meta charset="UTF-8">

<title>ResearchSkills — Knowledge Tree</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #fafbfc;
    color: #1a1a2e;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  header { text-align: center; margin-bottom: 32px; }
  header h1 { font-size: 2.2rem; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  header h1 .emoji { font-size: 2.4rem; }
  header p { font-size: 1rem; color: #666; max-width: 520px; margin: 0 auto; }
  header a { color: #2563eb; text-decoration: none; }
  header a:hover { text-decoration: underline; }

  /* ── stats banner ── */
  .stats-banner {
    display: flex; justify-content: center; align-items: center; gap: 32px;
    margin: 0 auto 24px; padding: 20px 32px; max-width: 680px;
    background: #fff; border: 1px solid #e8e8e8; border-radius: 16px;
  }
  .stat-item { text-align: center; }
  .stat-number { font-size: 2rem; font-weight: 700; color: #1a1a2e; line-height: 1.2; }
  .stat-number.highlight { color: #059669; }
  .stat-label { font-size: 0.82rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }
  .stat-divider { width: 1px; height: 40px; background: #e0e0e0; }

  /* ── search bar ── */
  .search-container { max-width: 680px; margin: 0 auto 40px; position: relative; }
  .search-input {
    width: 100%; padding: 12px 44px 12px 16px;
    background: #fff; border: 1px solid #ddd;
    border-radius: 12px; color: #333; font-size: 0.95rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input::placeholder { color: #aaa; }
  .search-input:focus { border-color: rgba(37,99,235,0.4); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #999; font-size: 1.2rem;
    cursor: pointer; display: none; padding: 4px; line-height: 1;
  }
  .search-clear.visible { display: block; }
  .search-clear:hover { color: #666; }

  /* ── tree layout ── */
  .tree-children {
    margin-left: 20px;
    padding-left: 20px;
    border-left: 1px solid var(--node-color, #ddd);
  }
  .tree-node {
    position: relative;
    margin: 4px 0;
  }
  .tree-node::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 16px;
    width: 20px;
    height: 1px;
    background: var(--node-color, #ddd);
  }

  /* ── node box ── */
  .node-box {
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .node-box:hover { transform: translateY(-1px); }

  .node-box.root-node {
    font-size: 1.3rem;
    font-weight: 700;
    padding: 14px 24px;
    justify-content: center;
  }
  .node-box.domain-node {
    font-size: 0.92rem;
    font-weight: 600;
  }
  .node-box.subgroup-node {
    font-size: 0.82rem;
    font-weight: 600;
  }
  .node-box.leaf-node {
    font-size: 0.8rem;
  }

  .node-box .icon { flex-shrink: 0; }
  .node-box .node-name { flex: 1; line-height: 1.3; }
  .node-box .node-code { font-size: 0.72rem; color: #888; font-family: 'SF Mono','Fira Code','Consolas',monospace; }
  .node-box .badge-count {
    font-size: 0.68rem; background: rgba(0,0,0,0.05); color: #888;
    padding: 1px 7px; border-radius: 8px; flex-shrink: 0;
  }
  .node-box .sg-arrow {
    font-size: 9px; transition: transform 0.2s; display: inline-block; flex-shrink: 0;
  }
  .node-box .sg-arrow.open { transform: rotate(90deg); }

  /* ── expand/collapse panel ── */
  .tree-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .tree-panel.open {
    max-height: 8000px;
  }

  /* ── reviewer badge in list ── */
  .sub-reviewer {
    display: inline-block; margin-top: 2px; margin-right: 4px;
    font-size: 0.7rem; font-weight: 600; padding: 2px 8px;
    border-radius: 10px; cursor: pointer;
    transition: box-shadow 0.2s;
    white-space: nowrap;
  }
  .sub-reviewer:hover { box-shadow: 0 0 10px var(--node-color, rgba(5,150,105,0.3)); }

  /* ── reviewer detail card ── */
  .reviewer-card {
    margin: 4px 0 8px 16px; padding: 10px 14px;
    background: #fff; border: 1px solid #e0e0e0;
    border-radius: 8px; animation: card-in 0.2s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reviewer-card .rc-name { font-size: 0.92rem; font-weight: 600; color: #1a1a2e; margin-bottom: 3px; }
  .reviewer-card .rc-role { font-size: 0.82rem; color: #666; margin-bottom: 6px; }
  .reviewer-card .rc-link { display: block; font-size: 0.78rem; color: #2563eb; text-decoration: none; margin-bottom: 2px; }
  .reviewer-card .rc-link:hover { text-decoration: underline; }

  /* ── search match ── */
  .search-match { background: rgba(37, 99, 235, 0.08); }

  /* ── tooltip ── */
  .desc-tooltip {
    display: none; position: fixed; z-index: 1000; max-width: 420px;
    padding: 10px 14px; background: rgba(255,255,255,0.97);
    border: 1px solid #ddd; border-radius: 8px;
    color: #333; font-size: 0.78rem; line-height: 1.5;
    pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  /* ── responsive ── */
  @media (max-width: 700px) {
    .desc-tooltip { max-width: 280px; }
  }
  @media (max-width: 600px) {
    body { padding: 20px 8px 60px; }
    .stats-banner { gap: 16px; padding: 14px 16px; }
    .stat-number { font-size: 1.4rem; }
  }

</style>

/* ── tooltip element ── */
var tooltip = document.createElement('div');
tooltip.className = 'desc-tooltip';
document.body.appendChild(tooltip);
var tooltipTimer = null;

function showTooltip(el, text) {
  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(function() {
    tooltip.textContent = text;
    tooltip.style.display = 'block';
    var rect = el.getBoundingClientRect();
    var left = rect.left;
    var top = rect.bottom + 6;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
    /* adjust if off-screen */
    var ttRect = tooltip.getBoundingClientRect();
    if (left + ttRect.width > window.innerWidth - 16) {
      tooltip.style.left = Math.max(8, window.innerWidth - ttRect.width - 16) + 'px';
    }
    if (top + ttRect.height > window.innerHeight - 16) {
      tooltip.style.top = (rect.top - ttRect.height - 6) + 'px';
    }
  }, 300);
}
function hideTooltip() {
  clearTimeout(tooltipTimer);
  tooltip.style.display = 'none';
}

/* ── helpers ── */
function countLeaves(n) {
  if (!n.children || !n.children.length) return 1;
  return n.children.reduce(function(s,c){ return s + countLeaves(c); }, 0);
}
function countReviewers(arr) {
  var n = 0;
  arr.forEach(function(d) {
    if (d.maintainer) n += d.maintainer.length;
    if (d.children) n += countReviewers(d.children);
  });
  return n;
}

var totalDomains = 8;
var totalSubs = DATA.reduce(function(s,g){ return s + countLeaves(g); }, 0);
var totalReviewers = countReviewers(DATA);

/* ── stats banner ── */
function mkStat(val, label, hl) {
  var d = document.createElement('div'); d.className = 'stat-item';
  var n = document.createElement('div'); n.className = 'stat-number' + (hl ? ' highlight' : ''); n.textContent = val;
  var l = document.createElement('div'); l.className = 'stat-label'; l.textContent = label;
  d.appendChild(n); d.appendChild(l); return d;
}
function mkDiv(cls) { var d = document.createElement('div'); d.className = cls; return d; }

var banner = document.getElementById('stats-banner');
banner.appendChild(mkStat(totalDomains, 'Domains', false));
banner.appendChild(mkDiv('stat-divider'));
banner.appendChild(mkStat(totalSubs, 'Subcategories', false));
banner.appendChild(mkDiv('stat-divider'));
banner.appendChild(mkStat(totalReviewers, 'Reviewers', true));

/* ── track state ── */
var openCard = null;

/* ── flatten domains from DATA groups ── */
var allDomains = [];
DATA.forEach(function(group) {
  group.children.forEach(function(domain) {
    allDomains.push(domain);
  });
});

/* ── compute rainbow colors ── */
/* Count total leaves across all domains to assign hues */
var domainLeafCounts = [];
var totalLeafCount = 0;
allDomains.forEach(function(domain) {
  var lc = countLeaves(domain);
  domainLeafCounts.push(lc);
  totalLeafCount += lc;
});

/* Compute cumulative positions and assign hue ranges */
var domainHues = [];
var cumulative = 0;
allDomains.forEach(function(domain, idx) {
  var startHue = (cumulative / totalLeafCount) * 360;
  cumulative += domainLeafCounts[idx];
  var endHue = (cumulative / totalLeafCount) * 360;
  domainHues.push({ start: startHue, end: endHue });
});

function hslColor(hue, s, l) {
  return 'hsl(' + Math.round(hue) + ',' + s + '%,' + l + '%)';
}
function hslaColor(hue, s, l, a) {
  return 'hsla(' + Math.round(hue) + ',' + s + '%,' + l + '%,' + a + ')';
}

function applyNodeStyle(el, hue) {
  el.style.setProperty('--node-color', hslColor(hue, 70, 50));
  el.style.border = '1px solid ' + hslaColor(hue, 70, 50, 0.3);
  el.style.background = 'linear-gradient(135deg, ' + hslaColor(hue, 70, 50, 0.1) + ', ' + hslaColor(hue, 70, 50, 0.04) + ')';
}

/* ── build the vertical tree ── */
var treeContainer = document.getElementById('tree-container');

/* Root node */
var rootNode = document.createElement('div');
rootNode.className = 'node-box root-node';
applyNodeStyle(rootNode, 200);
rootNode.textContent = '\ud83c\udf0d ResearchSkills';
treeContainer.appendChild(rootNode);

/* Domain children container */
var domainChildren = document.createElement('div');
domainChildren.className = 'tree-children';
domainChildren.style.setProperty('--node-color', '#ccc');
treeContainer.appendChild(domainChildren);

/* Store references for search */
var domainEntries = [];

allDomains.forEach(function(domain, domIdx) {
  var hueRange = domainHues[domIdx];
  var domainHue = hueRange.start;

  /* Domain tree node wrapper */
  var domWrapper = document.createElement('div');
  domWrapper.className = 'tree-node';
  domWrapper.style.setProperty('--node-color', hslColor(domainHue, 70, 50));

  /* Domain box */
  var box = document.createElement('div');
  box.className = 'node-box domain-node';
  applyNodeStyle(box, domainHue);

  var icon = document.createElement('span');
  icon.className = 'icon';
  icon.textContent = domain.icon;
  box.appendChild(icon);

  var nameEl = document.createElement('span');
  nameEl.className = 'node-name';
  nameEl.textContent = domain.name;
  box.appendChild(nameEl);

  var leafCount = domainLeafCounts[domIdx];
  var badge = document.createElement('span');
  badge.className = 'badge-count';
  badge.textContent = leafCount;
  box.appendChild(badge);

  domWrapper.appendChild(box);

  /* Panel for domain's children (collapsible) */
  var panel = document.createElement('div');
  panel.className = 'tree-panel';

  var panelChildren = document.createElement('div');
  panelChildren.className = 'tree-children';
  panelChildren.style.setProperty('--node-color', hslColor(domainHue, 70, 50));

  /* Build children recursively */
  var leafIdx = { val: 0 };
  buildTreeChildren(domain.children, panelChildren, hueRange, leafIdx, domIdx);

  panel.appendChild(panelChildren);
  domWrapper.appendChild(panel);

  /* Click to expand/collapse */
  box.addEventListener('click', function() {
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
      box.style.boxShadow = '0 0 16px ' + hslaColor(domainHue, 70, 50, 0.3);
    } else {
      box.style.boxShadow = '';
    }
  });

  domainChildren.appendChild(domWrapper);

  domainEntries.push({ box: box, panel: panel, wrapper: domWrapper, domain: domain, hue: domainHue });
});

function buildTreeChildren(children, parentEl, hueRange, leafIdx, domIdx) {
  children.forEach(function(sub) {
    if (sub.children && sub.children.length > 0) {
      /* Sub-group node */
      var subLeafCount = countLeaves(sub);
      var subHue = hueRange.start + ((leafIdx.val + subLeafCount / 2) / domainLeafCounts[domIdx]) * (hueRange.end - hueRange.start);

      var nodeWrap = document.createElement('div');
      nodeWrap.className = 'tree-node';
      nodeWrap.style.setProperty('--node-color', hslColor(subHue, 70, 50));

      var sgBox = document.createElement('div');
      sgBox.className = 'node-box subgroup-node';
      sgBox._name = (sub.name || '').toLowerCase();
      sgBox._code = (sub.code || '').toLowerCase();
      applyNodeStyle(sgBox, subHue);

      var arrow = document.createElement('span');
      arrow.className = 'sg-arrow';
      arrow.textContent = '\u25b6';
      sgBox.appendChild(arrow);

      var sgName = document.createElement('span');
      sgName.className = 'node-name';
      sgName.textContent = sub.name;
      sgBox.appendChild(sgName);

      if (sub.code) {
        var sgCode = document.createElement('span');
        sgCode.className = 'node-code';
        sgCode.textContent = '(' + sub.code + ')';
        sgBox.appendChild(sgCode);
      }

      var sgCount = document.createElement('span');
      sgCount.className = 'badge-count';
      sgCount.textContent = sub.children.length;
      sgBox.appendChild(sgCount);

      nodeWrap.appendChild(sgBox);

      var subPanel = document.createElement('div');
      subPanel.className = 'tree-panel';

      var subChildren = document.createElement('div');
      subChildren.className = 'tree-children';
      subChildren.style.setProperty('--node-color', hslColor(subHue, 70, 50));

      buildTreeChildren(sub.children, subChildren, hueRange, leafIdx, domIdx);

      subPanel.appendChild(subChildren);
      nodeWrap.appendChild(subPanel);

      sgBox.addEventListener('click', function() {
        subPanel.classList.toggle('open');
        arrow.classList.toggle('open');
        if (subPanel.classList.contains('open')) {
          sgBox.style.boxShadow = '0 0 16px ' + hslaColor(subHue, 70, 50, 0.3);
        } else {
          sgBox.style.boxShadow = '';
        }
      });

      parentEl.appendChild(nodeWrap);
    } else {
      /* Leaf node */
      var leafHue = hueRange.start + (leafIdx.val / domainLeafCounts[domIdx]) * (hueRange.end - hueRange.start);
      leafIdx.val++;

      var leafWrap = document.createElement('div');
      leafWrap.className = 'tree-node';
      leafWrap.style.setProperty('--node-color', hslColor(leafHue, 70, 50));

      var leafBox = document.createElement('div');
      leafBox.className = 'node-box leaf-node';
      leafBox._name = (sub.name || '').toLowerCase();
      leafBox._code = (sub.code || '').toLowerCase();
      applyNodeStyle(leafBox, leafHue);

      var bullet = document.createElement('span');
      bullet.textContent = '\u2022';
      bullet.style.color = hslColor(leafHue, 70, 50);
      bullet.style.flexShrink = '0';
      leafBox.appendChild(bullet);

      var leafName = document.createElement('span');
      leafName.className = 'node-name';
      leafName.textContent = sub.name;
      leafBox.appendChild(leafName);

      if (sub.code) {
        var leafCode = document.createElement('span');
        leafCode.className = 'node-code';
        leafCode.textContent = '(' + sub.code + ')';
        leafBox.appendChild(leafCode);
      }

      /* Reviewer badges */
      if (sub.maintainer && sub.maintainer.length > 0) {
        sub.maintainer.forEach(function(m) {
          var badge = document.createElement('span');
          badge.className = 'sub-reviewer';
          badge.textContent = m.nameEn;
          badge.style.color = hslColor(leafHue, 70, 50);
          badge.style.border = '1px solid ' + hslaColor(leafHue, 70, 50, 0.4);
          badge.style.background = hslaColor(leafHue, 70, 50, 0.08);
          badge.style.setProperty('--node-color', hslColor(leafHue, 70, 50));
          badge.addEventListener('click', function(e) {
            e.stopPropagation();
            if (openCard) { var prev = openCard; openCard.remove(); openCard = null; if (prev._gh === m.github) return; }
            var card = document.createElement('div');
            card.className = 'reviewer-card';
            card._gh = m.github;

            var rn = document.createElement('div'); rn.className = 'rc-name'; rn.textContent = m.name + ' / ' + m.nameEn; card.appendChild(rn);
            var rr = document.createElement('div'); rr.className = 'rc-role'; rr.textContent = m.role + ' \u00b7 ' + m.affiliation; card.appendChild(rr);
            var rl = document.createElement('a'); rl.className = 'rc-link'; rl.href = 'https://github.com/' + m.github; rl.target = '_blank'; rl.rel = 'noopener'; rl.textContent = '@' + m.github + ' \u2192'; card.appendChild(rl);
            if (m.homepage) {
              var rh = document.createElement('a'); rh.className = 'rc-link'; rh.href = m.homepage; rh.target = '_blank'; rh.rel = 'noopener'; rh.textContent = '\ud83d\udd17 ' + m.homepage.replace(/^https?:\/\//, ''); card.appendChild(rh);
            }
            leafWrap.insertAdjacentElement('afterend', card);
            openCard = card;
          });
          leafBox.appendChild(badge);
        });
      }

      /* tooltip on hover */
      var desc = DESCRIPTIONS[sub.code];
      if (desc) {
        leafBox.addEventListener('mouseenter', function() { showTooltip(leafBox, desc); });
        leafBox.addEventListener('mouseleave', hideTooltip);
      }

      leafWrap.appendChild(leafBox);
      parentEl.appendChild(leafWrap);
    }
  });
}

/* ── search ── */
var searchInput = document.getElementById('search-input');
var searchClear = document.getElementById('search-clear');

searchInput.addEventListener('input', function() {
  var q = searchInput.value.trim().toLowerCase();
  searchClear.classList.toggle('visible', q.length > 0);

  /* Reset all search highlights */
  document.querySelectorAll('.node-box.leaf-node').forEach(function(el) { el.classList.remove('search-match'); });
  document.querySelectorAll('.tree-panel').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.sg-arrow').forEach(function(el) { el.classList.remove('open'); });
  document.querySelectorAll('.node-box').forEach(function(el) { el.style.boxShadow = ''; });

  if (!q) {
    return;
  }

  /* Search all domains and open matching ones */
  domainEntries.forEach(function(entry) {
    var panel = entry.panel;
    var leafNodes = panel.querySelectorAll('.node-box.leaf-node');
    var subgroupNodes = panel.querySelectorAll('.node-box.subgroup-node');
    var hasMatch = false;

    leafNodes.forEach(function(leafBox) {
      if ((leafBox._name && leafBox._name.includes(q)) || (leafBox._code && leafBox._code.includes(q))) {
        leafBox.classList.add('search-match');
        hasMatch = true;
        /* expand parent panels */
        var el = leafBox.parentElement;
        while (el) {
          if (el.previousElementSibling && el.previousElementSibling.classList && el.previousElementSibling.classList.contains('tree-children')) {
            /* skip */
          }
          var parentPanel = el.closest('.tree-panel');
          if (parentPanel) {
            parentPanel.classList.add('open');
            /* open arrow in parent subgroup */
            var parentNode = parentPanel.parentElement;
            if (parentNode) {
              var sgBox = parentNode.querySelector(':scope > .node-box .sg-arrow');
              if (sgBox) sgBox.classList.add('open');
            }
          }
          el = parentPanel ? parentPanel.parentElement : null;
        }
      }
    });

    subgroupNodes.forEach(function(sgBox) {
      if ((sgBox._name && sgBox._name.includes(q)) || (sgBox._code && sgBox._code.includes(q))) {
        hasMatch = true;
        /* expand the subgroup's panel */
        var sgPanel = sgBox.parentElement.querySelector('.tree-panel');
        if (sgPanel) {
          sgPanel.classList.add('open');
          var arrow = sgBox.querySelector('.sg-arrow');
          if (arrow) arrow.classList.add('open');
        }
      }
    });

    if (hasMatch) {
      entry.panel.classList.add('open');
      entry.box.style.boxShadow = '0 0 16px ' + hslaColor(entry.hue, 70, 50, 0.3);
    }
  });
});

searchClear.addEventListener('click', function() {
  searchInput.value = '';
  searchInput.dispatchEvent(new Event('input'));
  searchInput.focus();
});
</script>
