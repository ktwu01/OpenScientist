<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenScientist — Reviewers</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(160deg, #0a0e18 0%, #121628 50%, #0e1220 100%);
    color: #c8d0e0;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-size: 2rem; font-weight: 700; color: #e8ecf4; margin-bottom: 8px; }
  header p { font-size: 0.95rem; color: #7888a8; max-width: 520px; margin: 0 auto 16px; }
  header a { color: #5a9cf5; text-decoration: none; }
  header a:hover { text-decoration: underline; }

  .back-link {
    display: inline-block; margin-bottom: 24px;
    font-size: 0.88rem; color: #5a9cf5; text-decoration: none;
  }
  .back-link:hover { text-decoration: underline; }

  .reviewer-count {
    font-size: 1.1rem; color: #34d399; font-weight: 600;
    text-align: center; margin-bottom: 32px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover {
    border-color: var(--accent, rgba(255,255,255,0.15));
    box-shadow: 0 0 20px var(--glow, rgba(255,255,255,0.05));
  }

  .card-name {
    font-size: 1.1rem; font-weight: 700; color: #e8ecf4;
    margin-bottom: 4px;
  }
  .card-role {
    font-size: 0.88rem; color: #8898b8; margin-bottom: 8px;
  }
  .card-subdomain {
    display: inline-block;
    font-size: 0.78rem; font-weight: 600;
    padding: 3px 10px; border-radius: 10px;
    margin-bottom: 10px;
  }
  .card-links {
    display: flex; flex-direction: column; gap: 4px;
  }
  .card-links a {
    font-size: 0.82rem; color: #5a9cf5; text-decoration: none;
  }
  .card-links a:hover { text-decoration: underline; }

  .apply-banner {
    text-align: center; margin-top: 48px; padding: 24px;
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; max-width: 600px; margin-left: auto; margin-right: auto;
  }
  .apply-banner p { font-size: 0.95rem; color: #8898b8; margin-bottom: 12px; }
  .apply-banner a {
    display: inline-block; padding: 10px 24px;
    background: linear-gradient(135deg, #34d39930, #34d39915);
    border: 1px solid #34d39950; border-radius: 10px;
    color: #34d399; font-weight: 600; font-size: 0.92rem;
    text-decoration: none; transition: box-shadow 0.2s;
  }
  .apply-banner a:hover { box-shadow: 0 0 16px rgba(52,211,153,0.3); }

  @media (max-width: 600px) {
    body { padding: 20px 12px 60px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <a class="back-link" href="./">&larr; Back to Knowledge Tree</a>

  <p>Want to contribute your expertise?</p>

  card.style.setProperty('--glow', r.color + '20');
